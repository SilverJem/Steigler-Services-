    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #0f172a;
        margin: 0;
      }
      #root {
        width: 100%;
        max-width: 100%;
        text-align: left;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }
      .bauhaus-grid {
        background-image: linear-gradient(#e5e2e1 1px, transparent 1px), linear-gradient(90deg, #e5e2e1 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .service-card:hover .service-icon {
        color: #00a699;
      }
      .project-card:hover .project-overlay {
        opacity: 1;
      }
      .active-filter {
        background-color: #006a62;
        color: #ffffff;
      }
      .form-input-border {
        border: none;
        border-bottom: 1px solid #bbc9c6;
        transition: border-color 0.2s ease;
      }
      .form-input-border:focus {
        border-bottom: 1px solid #006a62;
        outline: none;
        box-shadow: none;
      }
      
      /* New Hybrid Classes */
      .page-hero {
        background: linear-gradient(135deg, #0f1923 0%, #1a2d3a 50%, #0d2b35 100%);
        position: relative;
        overflow: hidden;
      }
      .page-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 80% at 80% 50%, rgba(0,166,153,0.15) 0%, transparent 70%),
          radial-gradient(ellipse 40% 60% at 20% 80%, rgba(0,166,153,0.08) 0%, transparent 60%);
        pointer-events: none;
      }
      .metric-bar {
        height: 6px;
        background: #e5e2e1;
        border-radius: 100px;
        overflow: hidden;
      }
      .metric-fill {
        height: 100%;
        background: linear-gradient(90deg, #00A699, #006a62);
        border-radius: 100px;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
